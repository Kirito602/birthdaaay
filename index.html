```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* PAGE SYSTEM */

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:1;
}

/* ---------- PAGE 1 ---------- */

#page1{
background:linear-gradient(135deg,#fd98dd,#ffffff,#fd98dd);
flex-direction:column;
}

/* corner ribbon */

.corner-ribbon{
position:absolute;
top:0;
right:0;
width:220px;
height:220px;
background:#ff1744;
clip-path:polygon(100% 0,0 0,100% 100%);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* heart */

.heart{
font-size:130px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* heart particles */

.particle{
position:absolute;
font-size:24px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{
opacity:1;
transform:translate(0,0) scale(1);
}
100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(.5);
}
}

/* ---------- PAGE 2 ---------- */

#page2{
display:none;
background:url("images/bg") no-repeat center center/cover;
}

/* Container */

.container{
position:relative;
width:900px;
height:600px;
transform-origin:center;
}

/* Birthday Title */

.title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:72px;
color:white;
text-shadow:0 10px 25px rgba(0,0,0,.6);
font-weight:600;
z-index:50;
pointer-events:none;
}

/* Polaroid */

.polaroid{
position:absolute;
background:white;
padding:12px 12px 35px;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.35);
transition:.35s;
z-index:5;
}

.polaroid img{
width:160px;
height:200px;
object-fit:cover;
border-radius:4px;
}

.polaroid:hover{
transform:scale(1.15);
box-shadow:0 25px 50px rgba(0,0,0,.5);
z-index:10;
}

/* Photo positions */

.p1{top:30px;left:120px;transform:rotate(-12deg);}
.p2{top:70px;right:120px;transform:rotate(10deg);}
.p3{top:300px;left:70px;transform:rotate(6deg);}
.p4{top:320px;right:70px;transform:rotate(-8deg);}
.p5{bottom:40px;left:260px;transform:rotate(-6deg);}
.p6{bottom:40px;right:260px;transform:rotate(6deg);}

/* Ribbon confetti */

.ribbon{
position:fixed;
top:-50px;
width:10px;
height:35px;
border-radius:3px;
opacity:.9;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-60px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(720deg);}
}

/* ---------------- RESPONSIVE FIX ---------------- */

@media (max-width:900px){
.container{transform:scale(.8);}
}

@media (max-width:700px){
.container{transform:scale(.65);}
}

@media (max-width:500px){
.container{transform:scale(.5);}
}

@media (max-width:380px){
.container{transform:scale(.42);}
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="Audio/happy_birthday.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<div class="page" id="page1">

<div class="corner-ribbon"></div>

<div class="heart" onclick="explodeHeart()">❤️</div>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="container">

<h1 class="title">Happy Birthday 🎂</h1>

<div class="polaroid p1">
<img src="images/paru 1.jpeg">
</div>

<div class="polaroid p2">
<img src="images/paru 2.jpeg">
</div>

<div class="polaroid p3">
<img src="images/paru 3.jpeg">
</div>

<div class="polaroid p4">
<img src="images/paru 4.jpeg">
</div>

<div class="polaroid p5">
<img src="images/paru 5.jpeg">
</div>

<div class="polaroid p6">
<img src="images/paru 6.jpeg">
</div>

</div>

</div>

<script>

/* HEART EXPLOSION */

function explodeHeart(){

const heart=document.querySelector(".heart");
const rect=heart.getBoundingClientRect();

/* start music */
document.getElementById("bgMusic").play();

for(let i=0;i<25;i++){

let p=document.createElement("div");
p.className="particle";
p.innerHTML="❤️";

let x=(Math.random()-0.5)*400+"px";
let y=(Math.random()-0.5)*400+"px";

p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

p.style.left=rect.left+"px";
p.style.top=rect.top+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);

}

heart.style.display="none";

setTimeout(()=>{

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";

startRibbons();

},800);

}

/* RIBBON CONFETTI */

function startRibbons(){

setInterval(()=>{

const ribbon=document.createElement("div");
ribbon.className="ribbon";

ribbon.style.left=Math.random()*100+"vw";

const colors=[
"#ff4d6d",
"#ffd93d",
"#6bcBef",
"#ff9a9e",
"#a29bfe",
"#55efc4"
];

ribbon.style.background=
colors[Math.floor(Math.random()*colors.length)];

ribbon.style.height=(20+Math.random()*40)+"px";

ribbon.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(ribbon);

setTimeout(()=>ribbon.remove(),6000);

},140);

}

</script>

</body>
</html>
